name: release

# Builds and pushes a container image to the kibble registry on every
# git tag matching v*. The image is tagged twice: with the version
# (v0.1.1 -> 0.1.1) and as `latest`. Deploy hosts pull from
# kibble.apps.blindhub.ca/cobdfamily/talkshow:<version>.
#
# The kibble registry is anonymous-push for the cobdfamily/* path
# and speaks plain HTTP, so no login step is needed and buildkit is
# configured to talk plain HTTP to it.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild (eg. v0.1.1)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: kibble.apps.blindhub.ca
  IMAGE: cobdfamily/talkshow

jobs:
  push:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: derive version (strip leading v)
        id: ver
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: set up buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."kibble.apps.blindhub.ca"]
              http = true
              insecure = true

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Multi-arch: amd64 for the production deploy host,
          # arm64 for apple-silicon dev boxes. Cross-build runs
          # on amd64 GitHub runners via the QEMU step above; the
          # build is a couple of minutes slower than single-arch
          # was, but the manifest list means dev hosts no longer
          # need ``platform: linux/amd64`` pins in their compose
          # files.
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Attach a CycloneDX 1.6 SBOM alongside the image in
      # kibble via the OCI 1.1 referrers API (`oras attach`).
      # Mirrors trunk v5.11+'s release flow + dispatch +
      # brian; see state-of-the-stack-2026-05-20 Part X
      # step 2 for the rationale.
      - name: install uv (for SBOM generation)
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true
      - name: sync dependencies
        run: uv sync --frozen
      - name: generate CycloneDX SBOM
        run: |
          # uvx runs cyclonedx-py directly; self-hosted runner lacks ~/.local/bin on PATH
          uvx --from cyclonedx-bom cyclonedx-py environment .venv/bin/python \
            --pyproject pyproject.toml \
            --output-reproducible \
            --output-file bom.cdx.json
      - name: install oras
        uses: oras-project/setup-oras@v1
      - name: attach SBOM as OCI 1.1 referrer
        run: |
          oras attach \
            --artifact-type application/vnd.cyclonedx+json \
            --plain-http \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }} \
            bom.cdx.json:application/vnd.cyclonedx+json

      - name: summary
        run: |
          {
            echo "### Pushed"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE }}:latest\`"
            echo ""
            echo "### SBOM attached"
            echo ""
            echo "- artifact-type \`application/vnd.cyclonedx+json\`"
            echo "- discover via:"
            echo "  \`oras discover --plain-http ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
