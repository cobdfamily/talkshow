name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt JS actions into Node.js 24 ahead of GitHub forcing it on
# 2026-06-16 (Node 20 actions are deprecated). Runs the action JS
# under Node 24 now so any incompatibility surfaces early.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with: { version: latest, enable-cache: true }
      - run: uv python install 3.12
      - run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check src tests

  pytest:
    runs-on: self-hosted
    needs: [lint]
    steps:
      - uses: actions/checkout@v6

      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true

      - name: pin python
        run: uv python install 3.12

      - name: sync deps (incl. dev)
        run: uv sync --frozen

      - name: run pytest with coverage
        run: uv run pytest -q --cov --cov-report=term --cov-report=xml

      - name: upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
